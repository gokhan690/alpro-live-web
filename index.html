<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>AlPro V9.0 — Frontend Rebuild</title>
  <style>
    :root{
      --bg:#02070d;
      --bg2:#07111c;
      --panel:#0a1624;
      --panel2:#0e1b2b;
      --line:rgba(255,255,255,.085);
      --line2:rgba(217,163,66,.20);
      --gold:#d9a342;
      --gold2:#f0c46c;
      --blue:#3aa7ff;
      --orange:#f3a02f;
      --green:#32d27c;
      --red:#ff625c;
      --text:#eef5fc;
      --muted:#8da3b8;
      --shadow:0 20px 70px rgba(0,0,0,.36);
      --side:252px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 0%,rgba(217,163,66,.13),transparent 22%),
        radial-gradient(circle at 86% 14%,rgba(58,167,255,.075),transparent 25%),
        linear-gradient(180deg,#02070d,#07111c 48%,#050910);
      color:var(--text);
      overflow:hidden;
    }
    button,input,select,textarea{font-family:inherit}
    button{cursor:pointer}
    .app{height:100%;display:grid;grid-template-columns:var(--side) 1fr}
    .sidebar{
      min-width:0;
      height:100vh;
      overflow:auto;
      background:linear-gradient(180deg,#081522,#050b13);
      border-right:1px solid rgba(217,163,66,.18);
      box-shadow:18px 0 55px rgba(0,0,0,.28);
      padding:14px 10px 20px;
    }
    .brand{
      padding:14px 12px 16px;
      border-radius:18px;
      background:linear-gradient(135deg,rgba(217,163,66,.09),rgba(58,167,255,.03));
      border:1px solid rgba(217,163,66,.15);
      margin-bottom:14px;
    }
    .brand-top{display:flex;align-items:center;gap:10px}
    .brand-a{
      width:34px;height:34px;border-radius:11px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#07101b;display:flex;align-items:center;justify-content:center;
      font-weight:1000;font-size:20px;
    }
    .brand-name{font-size:18px;font-weight:1000;letter-spacing:.02em;color:#fff}
    .brand-sub{margin-top:7px;color:var(--muted);font-size:9px;letter-spacing:.2em;text-transform:uppercase}
    .nav-section{margin:15px 8px 7px;color:var(--gold);font-size:9px;letter-spacing:.16em;font-weight:950;text-transform:uppercase}
    .nav-btn{
      width:100%;
      border:1px solid transparent;
      background:transparent;
      color:#c9d9e8;
      border-radius:13px;
      padding:10px 11px;
      display:flex;align-items:center;gap:10px;
      font-weight:750;
      font-size:13px;
      text-align:left;
      margin:3px 0;
      transition:.16s ease;
    }
    .nav-btn:hover{background:rgba(217,163,66,.07);border-color:rgba(217,163,66,.16);color:#fff}
    .nav-btn.active{
      background:linear-gradient(90deg,rgba(217,163,66,.25),rgba(217,163,66,.07));
      border-color:rgba(217,163,66,.34);
      box-shadow:inset 3px 0 0 var(--gold);
      color:#fff;
    }
    .nav-ico{width:20px;text-align:center;color:var(--gold2)}
    .main{height:100vh;overflow:hidden;display:flex;flex-direction:column}
    .top{
      margin:10px 14px 0;
      display:grid;
      grid-template-columns:minmax(260px,2fr) 110px 130px 140px 56px minmax(185px,.9fr);
      align-items:stretch;
      border:1px solid rgba(255,255,255,.09);
      border-radius:20px;
      overflow:hidden;
      background:linear-gradient(180deg,rgba(9,20,33,.98),rgba(6,12,20,.98));
      box-shadow:0 18px 46px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.035);
      backdrop-filter:blur(16px);
      flex:0 0 auto;
    }
    .top-cell{
      min-height:62px;padding:10px 14px;border-right:1px solid rgba(255,255,255,.075);
      display:flex;flex-direction:column;justify-content:center;
    }
    .top-cell:last-child{border-right:none}
    .searchbox{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      background:linear-gradient(180deg,#0c1827,#0a1421);
      border:1px solid rgba(255,255,255,.09);
      border-radius:15px;padding:9px 13px;min-height:38px;
    }
    .search-main{font-size:12px;font-weight:900;color:#fff}
    .search-sub{font-size:9.5px;color:var(--muted);margin-top:1px}
    .search-ico{font-size:20px;color:#d5e3f1}
    .k{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-weight:900}
    .v{margin-top:4px;font-size:14px;font-weight:950;color:#fff;display:flex;align-items:center;gap:6px}
    .s{margin-top:2px;font-size:9px;color:var(--muted)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;box-shadow:0 0 12px rgba(50,210,124,.45)}
    .green{color:var(--green)!important}.red{color:var(--red)!important}.gold{color:var(--gold2)!important}
    .bell{align-items:center;position:relative;font-size:22px;color:#fff}
    .bell-badge{
      position:absolute;top:10px;right:13px;min-width:17px;height:17px;padding:0 4px;
      border-radius:999px;background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#07101b;font-size:9px;font-weight:1000;display:flex;align-items:center;justify-content:center
    }
    .user{display:flex;align-items:center;gap:10px}
    .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#d9e5f1,#93abc7);display:flex;align-items:center;justify-content:center;color:#07101b}
    .user-name{font-size:12px;font-weight:950;color:#fff}.user-sub{font-size:9px;color:var(--muted);margin-top:1px}
    .content{height:calc(100vh - 86px);overflow:auto;padding:18px 14px 28px}
    .page{display:none;animation:fade .16s ease}
    .page.active{display:block}
    @keyframes fade{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:none}}
    .title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;padding:0 4px;margin:0 0 18px}
    .page-title{
      font-size:28px;font-weight:1000;color:#fff;letter-spacing:-.03em;
    }
    .page-desc{margin-top:5px;color:var(--muted);font-size:12px}
    .demta{text-align:right}.demta .big{color:var(--gold2);font-size:38px;font-weight:1000;line-height:1;letter-spacing:.04em}.demta .small{color:#dfc58a;font-size:12px;margin-top:4px}
    .dashboard-hero-title{
      flex:1;text-align:center;color:var(--gold2);font-size:38px;line-height:1;font-weight:1000;letter-spacing:-.035em;text-shadow:0 0 28px rgba(217,163,66,.22);position:relative;
    }
    .dashboard-hero-title:after{content:'';position:absolute;left:18%;right:18%;bottom:-14px;height:1px;background:linear-gradient(90deg,transparent,rgba(217,163,66,.75),transparent)}
    .dashboard-hero-title:before{content:'';position:absolute;left:50%;bottom:-18px;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;background:var(--gold2);box-shadow:0 0 18px rgba(217,163,66,.85)}
    .stage{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:22px;align-items:start}
    .board,.panel,.card,.form-card{
      background:linear-gradient(180deg,rgba(11,22,36,.98),rgba(8,17,29,.98));
      border:1px solid rgba(255,255,255,.085);
      border-radius:18px;
      box-shadow:0 14px 36px rgba(0,0,0,.18);
      overflow:hidden;
    }
    .board{border-radius:22px;background:linear-gradient(180deg,rgba(8,18,31,.96),rgba(5,12,21,.98));box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.04)}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.06)}
    .panel-title{font-size:14px;font-weight:1000;color:#fff}
    .panel-body{padding:13px 14px}
    .kpis{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;padding:12px}
    .kpi{
      min-height:138px;padding:13px;border-radius:15px;
      background:linear-gradient(180deg,rgba(13,28,46,.96),rgba(8,17,30,.98));
      border:1px solid rgba(255,255,255,.085);position:relative;overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.16)
    }
    .kpi:before{content:'';position:absolute;right:-22px;bottom:-22px;width:84px;height:84px;border-radius:50%;background:radial-gradient(circle,rgba(58,167,255,.10),transparent 68%)}
    .kpi:after{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,rgba(217,163,66,0),rgba(217,163,66,.65),rgba(217,163,66,0));opacity:.45}
    .kpi-lbl{color:#dbe7f2;font-size:11px;font-weight:950}
    .kpi-sub{color:var(--muted);font-size:10px;margin-top:2px}
    .kpi-val{margin-top:8px;color:#fff;font-size:25px;line-height:1.05;font-weight:1000;letter-spacing:-.04em}
    .kpi-mini{margin-top:6px;font-size:11px;font-weight:950}
    .chart{width:100%;height:34px;margin-top:7px;opacity:.95}
    .ringbox{margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .ring{width:50px;height:50px;border-radius:50%;background:conic-gradient(var(--gold) 0 266deg,rgba(255,255,255,.08) 266deg 360deg);display:flex;align-items:center;justify-content:center;position:relative;font-size:10px;font-weight:1000}
    .ring:after{content:'';position:absolute;inset:7px;border-radius:50%;background:#0b1624}.ring span{position:relative;z-index:1}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 12px 12px}
    .grid4{display:grid;grid-template-columns:1.16fr 1fr .94fr .94fr;gap:12px;padding:0 12px 12px}
    .alert{display:flex;justify-content:space-between;gap:12px;padding:10px 11px;border-radius:13px;border:1px solid rgba(255,255,255,.06);margin-bottom:8px}
    .alert:last-child{margin-bottom:0}.alert.red{background:linear-gradient(135deg,rgba(255,98,92,.12),rgba(255,98,92,.035));border-color:rgba(255,98,92,.22)}.alert.orange{background:linear-gradient(135deg,rgba(243,160,47,.12),rgba(243,160,47,.035));border-color:rgba(243,160,47,.22)}.alert.green{background:linear-gradient(135deg,rgba(50,210,124,.10),rgba(50,210,124,.035));border-color:rgba(50,210,124,.18)}
    .alert .ttl{font-size:11px;font-weight:950;color:#fff}.alert .txt{margin-top:2px;color:var(--muted);font-size:9.5px;line-height:1.45}.alert .tm{color:#cbd8e5;font-size:9px;white-space:nowrap}
    .task{display:grid;grid-template-columns:58px 1fr auto;gap:9px;align-items:center;padding:8px 2px;border-bottom:1px dashed rgba(255,255,255,.055)}
    .task:last-child{border-bottom:none}.time{font-size:11px;font-weight:950;color:#e9f1fa}.taskname{font-size:10px;color:#fff}
    .tag,.pill{border-radius:999px;padding:4px 8px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;font-weight:950;border:1px solid rgba(255,255,255,.08)}
    .tag.trade,.pill.blue{background:rgba(58,167,255,.08);color:#bedfff;border-color:rgba(58,167,255,.18)}
    .tag.log,.pill.green{background:rgba(50,210,124,.08);color:#b6f0cf;border-color:rgba(50,210,124,.18)}
    .tag.fin,.pill.orange{background:rgba(217,163,66,.08);color:#ffe4a8;border-color:rgba(217,163,66,.18)}
    table{width:100%;border-collapse:collapse}th,td{padding:8px 7px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.05);text-align:left;color:#e8f0fa}th{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:950;background:#0b1725}td:last-child,th:last-child{text-align:right}
    .stat{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,.055)}.stat:last-child{border-bottom:none}.stat .name{color:var(--muted);font-size:11px}.stat .num{color:#fff;font-size:13px;font-weight:1000}
    .bars{display:flex;gap:8px;align-items:flex-end;height:102px;padding:8px 0 4px}.bar{flex:1;border-radius:10px 10px 4px 4px;background:linear-gradient(180deg,#7daef7,#356fbe)}.bar.goldbar{background:linear-gradient(180deg,#f6cf7a,#c7902f)}.bar-labels{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:9px}
    .foot{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:14px}.foot-card{padding:15px 16px;border-radius:18px;background:linear-gradient(180deg,rgba(8,18,30,.98),rgba(6,12,20,.98));border:1px solid rgba(217,163,66,.18);display:flex;gap:12px}.foot-card .ico{width:42px;height:42px;border-radius:14px;background:rgba(217,163,66,.10);color:var(--gold2);display:flex;align-items:center;justify-content:center;font-size:23px}.foot-card .name{font-size:13px;font-weight:1000}.foot-card .desc{color:var(--muted);font-size:10px;margin-top:3px;line-height:1.42}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .btn{border:none;border-radius:13px;padding:10px 12px;font-weight:950;color:#07101b;background:linear-gradient(135deg,var(--gold),var(--gold2))}
    .btn.secondary{background:rgba(255,255,255,.04);color:#fff;border:1px solid rgba(255,255,255,.09)}
    .btn.danger{background:rgba(255,98,92,.10);color:#ffb6b2;border:1px solid rgba(255,98,92,.22)}
    .list-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    label{display:block;font-size:10px;color:var(--muted);font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
    input,select,textarea{width:100%;background:#081421;color:#eef5fc;border:1px solid rgba(255,255,255,.10);border-radius:13px;padding:11px 12px;outline:none}
    input:focus,select:focus,textarea:focus{border-color:rgba(217,163,66,.38);box-shadow:0 0 0 3px rgba(217,163,66,.10)}
    .phone{background:linear-gradient(180deg,#07111b,#05101a);border:2px solid rgba(255,255,255,.18);border-radius:38px;padding:17px 14px 82px;box-shadow:0 24px 70px rgba(0,0,0,.38);color:#fff;position:relative;overflow:hidden;min-height:590px}
    .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:94px;height:25px;border-radius:0 0 18px 18px;background:#02060b;z-index:2}

h:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07101b;font-size:32px;font-weight:1000;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 34px rgba(0,0,0,.34)}.title-row{display:block}.dashboard-hero-title,.demta,.board,.foot{display:none!important}.stage{display:block}.phone-side{width:100%}.phone{border-radius:28px;border-width:1px;min-height:auto;box-shadow:0 18px 50px rgba(0,0,0,.30)}.grid2,.grid4,.kpis,.foot,.form-grid{grid-template-columns:1fr!important;padding:0;gap:10px}.panel,.card,.form-card{margin-bottom:12px}.list-grid{display:block}.panel-body{overflow-x:auto}table{min-width:740px}.page-title{font-size:23px}.search-sub{display:none}

<body>
  <div class="mobile-top">
    <div class="mobile-top-left"><div class="mobile-a">A</div><div><div class="mobile-title">AlPro V9.0</div><div class="mobile-sub">Metal Trading</div></div></div>
    <div class="mobile-right"><div class="mobile-time" id="mobileTime">--:--</div><div class="mobile-bell">🔔<span>3</span></div></div>
  </div>
  <div class="mobile-tabbar" id="mobileTabs"></div>
  <div class="mobile-fab" onclick="App.openAdd()">+</div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-top"><div class="brand-a">A</div><div><div class="brand-name">AlPro V9.0</div></div></div>
        <div class="brand-sub">İthalat Sistemi</div>
      </div>
      <div id="nav"></div>
    </aside>

    <main class="main">
      <section class="top">
        <div class="top-cell"><div class="searchbox"><div><div class="search-main">Global arama...</div><div class="search-sub">(örn. sipariş, müşteri, BL no, fatura)</div></div><div class="search-ico">⌕</div></div></div>
        <div class="top-cell"><div class="k">LME</div><div class="v"><span class="dot"></span>Açık</div><div class="s">London 15:42</div></div>
        <div class="top-cell"><div class="k">Saat</div><div class="v" id="timeNow">--</div><div class="s" id="dateNow">--</div></div>
        <div class="top-cell"><div class="k">USD/TRY</div><div class="v"><span id="usdTop">32,4287</span><span class="green">▲ +0,18%</span></div></div>
        <div class="top-cell bell">🔔<span class="bell-badge">3</span></div>
        <div class="top-cell"><div class="user"><div class="avatar">👤</div><div><div class="user-name">DEMTA A.Ş.</div><div class="user-sub">AlPro Admin</div></div></div></div>
      </section>

      <section class="content" id="content"></section>
    </main>
  </div>

  <script>
    const App = {
      page:'dashboard',
      data:{
        prices:{alu:'2.552,00',cop:'10.045,50',zin:'2.936,00',usd:'32,4287'},
        orders:[],
        suppliers:[],
        customers:[],
        invoices:[],
        bank:[],
        logistics:[],
        stock:[],
        reports:[]
      },
      nav:[
        ['ANA SAYFA',[['dashboard','🏠','Dashboard'],['lme','📈','Canlı Fiyatlar'],['tasks','✅','Bugün']]],
        ['TİCARET',[['suppliers','🏭','Tedarikçiler'],['orders','🛒','Siparişler'],['customers','👥','Müşteriler']]],
        ['LOJİSTİK',[['logistics','🚢','Lojistik'],['freight','⚓','Navlun'],['customs','🛃','Gümrük'],['documents','📎','Belgeler']]],
        ['FİNANS',[['bank','🏦','Banka'],['invoices','🧾','Faturalar'],['calculator','💰','Maliyet'],['hedge','🛡️','Hedge']]],
        ['RAPORLAR',[['reports','📋','Raporlar'],['analytics','📊','Analitik'],['income','💹','Gelir']]],
        ['SİSTEM',[['notify','🔔','Bildirimler'],['setup','⚙️','Ayarlar']]]
      ],
      init(){
        this.load();
        this.renderNav();
        this.renderMobileTabs();
        this.go('dashboard');
        this.tick();
        setInterval(()=>this.tick(),1000);
        this.tryFetchPrices();
      },
      load(){
        const get=(k)=>{try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(e){return[]}};
        this.data.orders=get('orders');
        this.data.suppliers=get('suppliers');
        this.data.customers=get('customers');
        this.data.invoices=get('invoices');
        this.data.bank=get('bank');
        this.data.logistics=get('v61_shipments').length?get('v61_shipments'):get('alpro_v61_shipments');
        this.data.stock=get('stock');
        this.data.reports=get('reports');
      },
      save(k,v){localStorage.setItem(k,JSON.stringify(v));this.data[k]=v;},
      tick(){
        const t=new Date();
        const time=t.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        const d=t.toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric'});
        document.getElementById('timeNow').textContent=time;
        document.getElementById('dateNow').textContent=d;
        document.getElementById('mobileTime').textContent=time.slice(0,5);
        document.getElementById('usdTop').textContent=this.data.prices.usd;
      },
      renderNav(){
        const el=document.getElementById('nav');
        el.innerHTML=this.nav.map(([s,items])=>`<div class="nav-section">${s}</div>${items.map(i=>`<button class="nav-btn" data-page="${i[0]}" onclick="App.go('${i[0]}')"><span class="nav-ico">${i[1]}</span><span>${i[2]}</span></button>`).join('')}`).join('');
      },
      renderMobileTabs(){
        const tabs=[['dashboard','⌂','Ana'],['lme','⌁','Fiyat'],['orders','🛒','Sipariş'],['bank','🏦','Finans'],['reports','▥','Rapor']];
        document.getElementById('mobileTabs').innerHTML=tabs.map(t=>`<button data-page="${t[0]}" onclick="App.go('${t[0]}')"><b>${t[1]}</b>${t[2]}</button>`).join('');
      },
      setActive(){
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===this.page));
        document.querySelectorAll('.mobile-tabbar button').forEach(b=>b.classList.toggle('active',b.dataset.page===this.page));
      },
      go(p){
        this.page=p; this.setActive(); this.load();
        const c=document.getElementById('content');
        c.innerHTML=this.renderPage(p);
      },
      openAdd(){
        if(['orders','suppliers','customers','invoices','bank','stock','logistics'].includes(this.page)){
          this.addDemo(this.page);
        } else this.go('orders');
      },
      addDemo(type){
        const map={orders:'orders',suppliers:'suppliers',customers:'customers',invoices:'invoices',bank:'bank',stock:'stock',logistics:'logistics'};
        const k=map[type]; if(!k)return;
        const arr=this.data[k]||[];
        const id=Date.now();
        const demo={
          id,
          no:'V9-'+String(id).slice(-5),
          name:'Yeni Kayıt',
          customer:'Demo Müşteri',
          supplier:'Demo Tedarikçi',
          product:'A7 Aluminium',
          qty:'100 MT',
          amount:250000,
          status:'Aktif',
          eta:'30 May',
          pol:'Hamburg',
          pod:'Mersin'
        };
        arr.unshift(demo);
        this.save(k,arr);
        this.go(type);
      },
      del(k,id){
        const arr=(this.data[k]||[]).filter(x=>String(x.id)!==String(id));
        this.save(k,arr);
        this.go(this.page);
      },
      renderPage(p){
        if(p==='dashboard') return this.dashboard();
        if(p==='lme') return this.marketPage();
        if(p==='orders') return this.dataPage('orders','Siparişler','Yeni siparişleri, ürünleri ve teslim durumunu takip et.','🛒');
        if(p==='suppliers') return this.dataPage('suppliers','Tedarikçiler','Tedarikçi fiyatları, ürünleri ve ödeme koşulları.','🏭');
        if(p==='customers') return this.dataPage('customers','Müşteriler','Müşteri teklifleri, limitler ve iletişim bilgileri.','👥');
        if(p==='logistics'||p==='freight') return this.logisticsPage();
        if(p==='bank') return this.dataPage('bank','Banka & Ödeme','Nakit pozisyonu, alacak/borç ve ödeme akışı.','🏦');
        if(p==='invoices') return this.dataPage('invoices','Faturalar','Vade, ödeme ve fatura takibi.','🧾');
        if(p==='stock') return this.dataPage('stock','Stok','Depo, ürün ve miktar takibi.','📦');
        if(p==='reports'||p==='analytics'||p==='income') return this.reportsPage(p);
        if(p==='calculator'||p==='hedge'||p==='customs') return this.toolsPage(p);
        return this.genericPage(p);
      },
      title(t,d,icon=''){
        return `<div class="title-row"><div><div class="page-title">${icon} ${t}</div><div class="page-desc">${d}</div></div><div class="demta"><div class="big">DEMTA</div><div class="small">Metal Trading & Operations</div></div></div>`;
      },
      chart(color){return `<svg class="chart" viewBox="0 0 120 36" preserveAspectRatio="none"><path d="M2 28 C 12 27, 16 16, 26 18 S 40 31, 54 19 S 76 10, 92 18 S 108 8, 118 12" fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round"/><path d="M2 28 C 12 27, 16 16, 26 18 S 40 31, 54 19 S 76 10, 92 18 S 108 8, 118 12 L118 36 L2 36 Z" fill="${color}22"/></svg>`},
      dashboard(){
        const p=this.data.prices, orders=this.data.orders;
        return `
          <div class="title-row"><div></div><div class="dashboard-hero-title">AlPro V9.0 Premium Navigation & UI</div><div class="demta"><div class="big">DEMTA</div><div class="small">Metal Trading & Operations</div></div></div>
          <div class="stage">
            <div class="board">
              <div class="kpis">
                ${this.kpi('LME Aluminium','3M Cash',p.alu,'+18,50 (+0,73%)','#3aa7ff')}
                ${this.kpi('Copper Cathode','3M Cash',p.cop,'+65,00 (+0,65%)','#f3a02f')}
                ${this.kpi('Zinc','3M Cash',p.zin,'+22,00 (+0,76%)','#3aa7ff')}
                ${this.kpi('USD/TRY','Spot',p.usd,'+0,0590 (+0,18%)','#3d8fe6')}
                <div class="kpi"><div class="kpi-lbl">Open Orders</div><div class="kpi-sub">Tüm Siparişler</div><div class="kpi-val">${orders.length||23}</div><div class="kpi-mini">Toplam Değer</div></div>
                <div class="kpi"><div class="kpi-lbl">Cash Position</div><div class="kpi-sub">Toplam Nakit</div><div class="kpi-val">USD 5.842.310</div><div class="ringbox"><div class="kpi-sub">Kullanılabilir<br>Kredi Oranı</div><div class="ring"><span>74%</span></div></div></div>
              </div>
              <div class="grid2">
                ${this.alertsPanel()}
                ${this.tasksPanel()}
              </div>
              <div class="grid4">
                ${this.tablePanel('Son Siparişler',this.orderRows())}
                ${this.tablePanel('Lojistik / ETA',this.logRows())}
                ${this.statsPanel()}
                ${this.weeklyPanel()}
              </div>
            </div>
            <div class="phone-side">${this.phoneMock()}</div>
          </div>
          <div class="foot">
            ${this.foot('🛡️','Güvenli','Kurumsal güvenlik standartları ve veri koruma')}
            ${this.foot('⚡','Hızlı','Yüksek performanslı altyapı ve akıllı süreçler')}
            ${this.foot('📊','Veri Odaklı','Gerçek zamanlı verilerle akıllı karar desteği')}
            ${this.foot('🌍','Küresel Uyumlu','LME, gümrük ve finans regülasyonlarına tam uyum')}
          </div>`;
      },
      kpi(a,b,c,d,color){return `<div class="kpi"><div class="kpi-lbl">${a}</div><div class="kpi-sub">${b}</div><div class="kpi-val">${c}</div><div class="kpi-mini green">${d}</div>${this.chart(color)}</div>`},
      alertsPanel(){return `<div class="panel"><div class="panel-head"><div class="panel-title">🚨 Kritik Uyarılar</div></div><div class="panel-body">
        ${this.alert('red','Gümrük dosyası süresi dolmak üzere','3 dosya 24 saat içinde süresi doluyor.','2 saat önce')}
        ${this.alert('orange','Navlun onayı bekleyen sevkiyatlar','2 sevkiyat için navlun onayı bekleniyor.','4 saat önce')}
        ${this.alert('orange','Vade yaklaşan ödemeler','Toplam USD 1.245.000 ödeme vadesi 3 gün içinde.','6 saat önce')}
      </div></div>`},
      alert(c,t,d,tm){return `<div class="alert ${c}"><div><div class="ttl">${t}</div><div class="txt">${d}</div></div><div class="tm">${tm}</div></div>`},
      tasksPanel(){const tasks=[['09:00','Tedarikçi fiyat güncellemelerini kontrol et','trade','Ticaret'],['11:00','Müşteri tekliflerini gözden geçir','trade','Ticaret'],['14:00','Gümrük dosyası kontrolü ve onayı','log','Lojistik'],['15:30','Ödeme talimatlarını gözden geçir','fin','Finans'],['16:30','Gün sonu nakit pozisyon raporu','fin','Finans']];return `<div class="panel"><div class="panel-head"><div class="panel-title">✅ Bugün Ne Yapmalıyım?</div></div><div class="panel-body">${tasks.map(x=>`<div class="task"><div class="time">${x[0]}</div><div class="taskname">${x[1]}</div><div class="tag ${x[2]}">${x[3]}</div></div>`).join('')}</div></div>`},
      tablePanel(t,rows){return `<div class="panel"><div class="panel-head"><div class="panel-title">${t}</div></div><div class="panel-body">${rows}</div></div>`},
      orderRows(){const data=this.data.orders.length?this.data.orders:[{no:'SO-20240524-101',customer:'ABC Metal',product:'Aluminium',qty:'1.250 MT',status:'Onaylandı'},{no:'SO-20240524-100',customer:'Global Alloys',product:'Copper',qty:'800 MT',status:'Beklemede'},{no:'SO-20240523-099',customer:'Metal Trade Ltd.',product:'Zinc',qty:'1.100 MT',status:'Onaylandı'}];return `<table><thead><tr><th>Sipariş No</th><th>Müşteri</th><th>Ürün</th><th>Miktar</th><th>Durum</th></tr></thead><tbody>${data.slice(0,5).map(o=>`<tr><td>${o.no||o.id||'-'}</td><td>${o.customer||o.name||'-'}</td><td>${o.product||'-'}</td><td>${o.qty||o.amount||'-'}</td><td><span class="pill ${/bek|hazır|plan/i.test(o.status||'')?'orange':'green'}">${o.status||'Aktif'}</span></td></tr>`).join('')}</tbody></table>`},
      logRows(){const data=this.data.logistics.length?this.data.logistics:[{track:'BL-240521-056',pol:'Hamburg',pod:'Mersin',eta:'26 May',status:'Yolda'},{track:'BL-240519-055',pol:'Rotterdam',pod:'Izmir',eta:'28 May',status:'Yolda'},{track:'BL-240518-054',pol:'Antwerp',pod:'Gebze',eta:'30 May',status:'Planlandı'}];return `<table><thead><tr><th>BL</th><th>Rota</th><th>ETA</th><th>Durum</th></tr></thead><tbody>${data.slice(0,5).map(s=>`<tr><td>${s.track||s.bl||s.id||'-'}</td><td>${s.pol||'-'} → ${s.pod||'-'}</td><td>${s.eta||'-'}</td><td><span class="pill ${/plan/i.test(s.status||'')?'orange':'blue'}">${s.status||'Yolda'}</span></td></tr>`).join('')}</tbody></table>`},
      statsPanel(){return `<div class="panel"><div class="panel-head"><div class="panel-title">Finans Özeti</div></div><div class="panel-body">${[['Toplam Nakit','USD 5.842.310'],['Toplam Alacak','USD 19.654.210'],['Açık Borçlar','USD 2.105.420'],['Bu Ay Kâr','USD 742.150'],['Kâr Marjı','3,62%']].map(r=>`<div class="stat"><div class="name">${r[0]}</div><div class="num">${r[1]}</div></div>`).join('')}</div></div>`},
      weeklyPanel(){return `<div class="panel"><div class="panel-head"><div class="panel-title">Haftalık Rapor Özeti</div></div><div class="panel-body"><div class="bars">${[42,54,61,58,72,46,38].map((v,i)=>`<div class="bar ${i===5?'goldbar':''}" style="height:${v}%"></div>`).join('')}</div><div class="bar-labels"><span>Pzt</span><span>Sal</span><span>Çar</span><span>Per</span><span>Cum</span><span>Cmt</span><span>Paz</span></div></div></div>`},
      foot(i,n,d){return `<div class="foot-card"><div class="ico">${i}</div><div><div class="name">${n}</div><div class="desc">${d}</div></div></div>`},
      phoneMock(){return `<div class="phone"><div class="notch"></div><div class="pm-top"><div class="pm-time" id="pmTime">${new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}</div><div class="pm-icons">▴ Wi‑Fi ▰</div></div><div class="pm-brand"><div class="pm-logo"><div class="pm-a">A</div><div>AlPro V9.0</div></div><div class="pm-bell">🔔<span>3</span></div></div><div class="pm-hello">Merhaba, Mehmet 👋</div><div class="pm-date">${new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric'})}</div><div class="pm-grid">${this.pmCard('LME Aluminium',this.data.prices.alu,'+0,73%','#3aa7ff')}${this.pmCard('Copper Cathode',this.data.prices.cop,'+0,65%','#f3a02f')}${this.pmCard('USD/TRY',this.data.prices.usd,'+0,18%','#3d8fe6')}<div class="pm-card"><div class="pm-lbl">Cash Position</div><div class="pm-val">USD 5.84M</div><div class="pm-mini gold">Kredi Oranı 74%</div></div></div><div class="pm-headline"><div>Hızlı İşlemler</div><button>Tümünü Gör ›</button></div><div class="pm-actions"><button class="pm-action" onclick="App.go('orders')"><div class="ico">📦</div><div class="tx">Yeni Sipariş</div></button><button class="pm-action" onclick="App.go('customers')"><div class="ico">📝</div><div class="tx">Teklif</div></button><button class="pm-action" onclick="App.go('freight')"><div class="ico">🚚</div><div class="tx">Navlun</div></button><button class="pm-action" onclick="App.go('invoices')"><div class="ico">🧾</div><div class="tx">Fatura</div></button></div><div class="pm-panel"><div class="pm-ph"><div class="pm-pt">Bugün Ne Yapmalıyım?</div><div class="pm-count">5</div></div><div class="pm-task"><div class="pm-time2">09:00</div><div class="pm-tasktext">Tedarikçi fiyat güncellemelerini kontrol et</div><div class="pm-tag tag trade">Ticaret</div></div><div class="pm-task"><div class="pm-time2">14:00</div><div class="pm-tasktext">Gümrük dosyası kontrolü ve onayı</div><div class="pm-tag tag log">Lojistik</div></div></div><div class="pm-fab" onclick="App.openAdd()">+</div><div class="pm-tabbar"><button class="pm-tab active"><b>⌂</b>Ana</button><button class="pm-tab"><b>⌁</b>Fiyat</button><button class="pm-tab"><b>🛒</b>Sipariş</button><button class="pm-tab"><b>🏦</b>Finans</button><button class="pm-tab"><b>▥</b>Rapor</button></div></div>`},
      pmCard(a,b,c,col){return `<div class="pm-card"><div class="pm-lbl">${a}</div><div class="pm-val">${b}</div><div class="pm-mini green">${c}</div><svg class="pm-spark" viewBox="0 0 120 36" preserveAspectRatio="none"><path d="M2 28 C 12 27, 16 16, 26 18 S 40 31, 54 19 S 76 10, 92 18 S 108 8, 118 12" fill="none" stroke="${col}" stroke-width="2.4" stroke-linecap="round"/></svg></div>`},
      marketPage(){return this.title('Canlı Fiyatlar','LME, metal fiyatları ve kur takibi.','📈')+`<div class="kpis">${this.kpi('LME Aluminium','3M Cash',this.data.prices.alu,'+0,73%','#3aa7ff')}${this.kpi('Copper Cathode','3M Cash',this.data.prices.cop,'+0,65%','#f3a02f')}${this.kpi('Zinc','3M Cash',this.data.prices.zin,'+0,76%','#3aa7ff')}${this.kpi('USD/TRY','Spot',this.data.prices.usd,'+0,18%','#3d8fe6')}</div><div class="panel"><div class="panel-head"><div class="panel-title">Piyasa Notları</div><button class="btn secondary" onclick="App.tryFetchPrices()">Yenile</button></div><div class="panel-body">${this.alert('green','Sistem aktif','Fiyat ekranı V9 arayüzünde çalışıyor.','Şimdi')}</div></div>`},
      dataPage(key,title,desc,icon){
        const rows=this.data[key]||[];
        return this.title(title,desc,icon)+`<div class="list-grid"><div class="panel"><div class="panel-head"><div class="panel-title">${title} Listesi</div><div class="toolbar"><button class="btn" onclick="App.addDemo('${key}')">+ Ekle</button><button class="btn secondary" onclick="App.exportCSV('${key}')">Excel/CSV</button></div></div><div class="panel-body">${this.genericTable(key,rows)}</div></div><div class="form-card"><div class="panel-head"><div class="panel-title">Hızlı Kayıt</div></div><div class="panel-body"><div class="form-grid"><div><label>Ad / No</label><input id="f-name" placeholder="Kayıt adı"></div><div><label>Ürün</label><select id="f-product"><option>A7 Aluminium</option><option>A8 Aluminium</option><option>Katot Bakırı</option><option>Zinc</option></select></div><div><label>Miktar</label><input id="f-qty" placeholder="100 MT"></div><div><label>Durum</label><select id="f-status"><option>Aktif</option><option>Beklemede</option><option>Onaylandı</option><option>Yolda</option></select></div></div><button class="btn" style="margin-top:12px;width:100%" onclick="App.quickAdd('${key}')">Kaydet</button></div></div></div>`},
      genericTable(key,rows){
        if(!rows.length) rows=[{id:'demo1',no:'V9-DEMO',name:'Demo Kayıt',customer:'Demo Müşteri',supplier:'Demo Tedarikçi',product:'A7 Aluminium',qty:'100 MT',amount:'250000',status:'Aktif'}];
        return `<table><thead><tr><th>No</th><th>Ad/Müşteri</th><th>Ürün</th><th>Miktar/Tutar</th><th>Durum</th><th></th></tr></thead><tbody>${rows.slice(0,50).map(r=>`<tr><td>${r.no||r.id||'-'}</td><td>${r.name||r.customer||r.supplier||'-'}</td><td>${r.product||r.grade||'-'}</td><td>${r.qty||r.amount||r.total||'-'}</td><td><span class="pill green">${r.status||'Aktif'}</span></td><td><button class="btn danger" onclick="App.del('${key}','${r.id}')">Sil</button></td></tr>`).join('')}</tbody></table>`
      },
      quickAdd(key){
        const name=document.getElementById('f-name')?.value||'Yeni Kayıt';
        const product=document.getElementById('f-product')?.value||'A7 Aluminium';
        const qty=document.getElementById('f-qty')?.value||'100 MT';
        const status=document.getElementById('f-status')?.value||'Aktif';
        const arr=this.data[key]||[];
        arr.unshift({id:Date.now(),no:'V9-'+String(Date.now()).slice(-5),name,customer:name,supplier:name,product,qty,status});
        this.save(key,arr);this.go(key);
      },
      logisticsPage(){return this.dataPage('logistics','Lojistik / Navlun','BL, rota, ETA ve sevkiyat takibi.','🚢')},
      reportsPage(p){return this.title('Raporlar & Analitik','Haftalık rapor, gelir ve performans özeti.','📋')+`<div class="grid2"><div>${this.statsPanel()}</div><div>${this.weeklyPanel()}</div></div><div class="panel"><div class="panel-head"><div class="panel-title">Rapor Notları</div><button class="btn secondary" onclick="App.exportCSV('orders')">Siparişleri İndir</button></div><div class="panel-body">${this.alert('green','Rapor hazır','Haftalık görünüm V9 arayüzünde oluşturuldu.','Şimdi')}</div></div>`},
      toolsPage(p){return this.title('Araçlar','Maliyet, hedge ve gümrük hesaplama araçları.','🧮')+`<div class="grid2"><div class="form-card"><div class="panel-head"><div class="panel-title">Hızlı Maliyet Hesapla</div></div><div class="panel-body"><div class="form-grid"><div><label>LME</label><input id="calc-lme" value="2552"></div><div><label>Formül</label><input id="calc-prem" value="-200"></div><div><label>Ton</label><input id="calc-ton" value="100"></div><div><label>Kur</label><input id="calc-fx" value="32.42"></div></div><button class="btn" style="margin-top:12px;width:100%" onclick="App.calc()">Hesapla</button><div id="calc-result" class="stat" style="margin-top:12px"><div class="name">Sonuç</div><div class="num">--</div></div></div></div><div class="panel">${this.alertsPanel()}</div></div>`},
      genericPage(p){return this.title('Sayfa','Bu modül V9 premium arayüzüne taşındı.','⚙️')+`<div class="panel"><div class="panel-head"><div class="panel-title">${p}</div></div><div class="panel-body">${this.alert('green','Aktif','Bu sayfa V9 tasarım sistemi içinde çalışıyor.','Şimdi')}</div></div>`},
      calc(){const l=Number(document.getElementById('calc-lme').value||0),pr=Number(document.getElementById('calc-prem').value||0),ton=Number(document.getElementById('calc-ton').value||0),fx=Number(document.getElementById('calc-fx').value||0);document.querySelector('#calc-result .num').textContent='USD '+((l+pr)*ton).toLocaleString('tr-TR')+' / TRY '+(((l+pr)*ton)*fx).toLocaleString('tr-TR')},
      exportCSV(key){const rows=this.data[key]||[];const csv=[Object.keys(rows[0]||{id:'',name:'',product:'',qty:'',status:''}).join(',')].concat(rows.map(r=>Object.values(r).map(v=>`"${String(v).replaceAll('"','""')}"`).join(','))).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`alpro-${key}.csv`;a.click()},
      tryFetchPrices(){fetch('/api/health').catch(()=>{});},
    };
    window.App=App;
    document.addEventListener('DOMContentLoaded',()=>App.init());
  </script>
</body>
</html>
